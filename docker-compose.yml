services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navigation-system
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-admin}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
